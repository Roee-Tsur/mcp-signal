name: CI

on:
  push:
    branches: [main]
  pull_request:

# Only need to read the repo contents to test it.
permissions:
  contents: read

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test · Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The versions declared in package.json `engines.node` (>=18).
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      # Tests run against source via vitest (jsdom) — no build step needed here.
      - run: npm test

  quality:
    name: Types, format & package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run format:check
      - run: npm run build
      # Server code must not leak into the widget bundles (browser-safe core / server split).
      - run: npm run check:bundle
      # publint + arethetypeswrong: the exports map resolves for every module mode.
      - run: npm run check:package
